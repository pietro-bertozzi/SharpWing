# Producer
apiVersion: v1
kind: Pod
metadata:
  name: producer-pod
spec:
  restartPolicy: Always
  initContainers:
  - name: wait-for-kafka
    image: busybox:1.36
    command: ['sh', '-c', 'until nc -z my-kafka 9092; do echo waiting for kafka; sleep 2; done;']
  containers:
  - name: producer
    image: producer-app:v1
    imagePullPolicy: Never
---
# Consumer
apiVersion: v1
kind: Pod
metadata:
  name: consumer-pod
spec:
  restartPolicy: Always
  initContainers:
  - name: wait-for-kafka
    image: busybox:1.36
    command: ['sh', '-c', 'until nc -z my-kafka 9092; do echo waiting for kafka; sleep 2; done;']
  containers:
  - name: consumer
    image: consumer-app:v1
    imagePullPolicy: Never